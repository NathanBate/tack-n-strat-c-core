name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DTACK_STRAT_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build -j 4
      - name: Test
        run: ctest --test-dir build --output-on-failure
